<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List</title>
<link rel="stylesheet" href="to_do.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

<div class="header-row">
    <div class="theme-toggle" id="themeToggle">
        <i id="themeIcon" class="fa-regular fa-moon"></i>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="container">
    <h1>To Do List</h1>
    <div class="note-form">
        <input type="text" id="title" placeholder="Note Title">
        <textarea id="content" placeholder="Note Content"></textarea>
        <button onclick="addNote()">Add Note</button>
    </div>
    <input type="text" id="search" placeholder="Search notes..." onkeyup="searchNotes()">
    <h2>My Notes</h2>
    <div id="notes-container"></div>
</div>

<div id="edit-modal" class="modal">
    <div class="modal-content">
        <h2>Edit Note</h2>
        <input type="hidden" id="edit-id">
        <input type="text" id="edit-title" placeholder="Note Title">
        <textarea id="edit-content" placeholder="Note Content"></textarea>
        <button onclick="updateNote()">Update</button>
        <button onclick="closeEditModal()" class="delete-btn">Cancel</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
